<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .lineart { fill:none; stroke:#2b2b2b; stroke-width:1.6; stroke-linejoin:round; }
      .top     { fill:#d99a5c; stroke:#8a5424; stroke-width:1.2; }
      .side    { fill:#b97a3f; stroke:#8a5424; stroke-width:1.2; }
      .spark   { fill:#e8b94a; stroke:#8a5424; stroke-width:0.6; }
    </style>
  </defs>

  <!-- left half: geometry-faithful line-art control image -->
  <polygon class="lineart" points="8,24 24,15 24,33 8,42" />
  <polygon class="lineart" points="8,24 24,15 24,15 8,24" />
  <line class="lineart" x1="8" y1="24" x2="24" y2="33" />

  <!-- right half: the styled color render coming out of it -->
  <polygon class="top"  points="30,20 46,11 62,20 46,29" />
  <polygon class="side" points="30,20 46,29 46,47 30,38" />
  <polygon class="lineart" points="46,29 62,20 62,38 46,47" style="fill:#c98a4c;stroke:#8a5424;stroke-width:1.2" />

  <!-- AI sparkle marking the transformation -->
  <path class="spark" d="M27 8 L29 13 L34 15 L29 17 L27 22 L25 17 L20 15 L25 13 Z" />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <style>
      .face   { fill:#bfe0f5; stroke:#3d6d8f; stroke-width:1.5; }
      .axisr  { stroke:#d0392b; stroke-width:2.5; stroke-linecap:round; }
      .axisg  { stroke:#2ca02c; stroke-width:2.5; stroke-linecap:round; }
      .guide  { stroke:#c020c0; stroke-width:1.6; stroke-dasharray:3 3; stroke-linecap:round; }
      .dot    { fill:#2ca02c; stroke:#186018; stroke-width:1; }
    </style>
  </defs>
  <!-- a drawn rectangle face -->
  <polygon class="face" points="16,26 44,20 50,40 22,46" />
  <!-- colored inference axes from a corner -->
  <line class="axisr" x1="16" y1="26" x2="52" y2="18" />
  <line class="axisg" x1="16" y1="26" x2="12" y2="50" />
  <!-- a dotted parallel/perpendicular inference guide -->
  <line class="guide" x1="44" y1="20" x2="50" y2="40" />
  <!-- colored inference endpoint marker -->
  <circle class="dot" cx="16" cy="26" r="4" />
</svg>
